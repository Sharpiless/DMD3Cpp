hydra:
  run:
    dir: outputs/${name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - gpus=[7]
    - name=PMP_Residual_Norm_ssil_KITTI_ETH3D_SfM_Indoor_test
    - ++chpt=PMP_Residual_Norm_ssil_KITTI
    - net=PMP_Residual_Norm_fast
    - num_workers=4
    - data=UNI
    - data.testset.mode=test
    - data.path=../datasets/uniformat_release/ETH3D_SfM_Indoor_test
    - test_batch_size=1
    - metric=MetricALL
    - ++save=true
  job:
    name: test
    chdir: false
    override_dirname: ++chpt=PMP_Residual_Norm_ssil_KITTI,++save=true,data.path=../datasets/uniformat_release/ETH3D_SfM_Indoor_test,data.testset.mode=test,data=UNI,gpus=[7],metric=MetricALL,name=PMP_Residual_Norm_ssil_KITTI_ETH3D_SfM_Indoor_test,net=PMP_Residual_Norm_fast,num_workers=4,test_batch_size=1
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.2'
    cwd: /data6/liangyingping/TPAMI-depth/DMD3Cpp/OMNI-DC/gitcode
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /data6/liangyingping/TPAMI-depth/DMD3Cpp/OMNI-DC/gitcode/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /data6/liangyingping/TPAMI-depth/DMD3Cpp/OMNI-DC/gitcode/outputs/PMP_Residual_Norm_ssil_KITTI_ETH3D_SfM_Indoor_test/2026-05-26_13-41-14
    choices:
      metric: MetricALL
      loss: MSMSE
      net: PMP_Residual_Norm_fast
      data: UNI
      sched/lr: NoiseOneCycleCosMo
      optim: AdamW
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
